name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

# cp314 wheels for TheAnimeScripter (win/linux/macos). Rehosted on TAS-Models-Host.
env:
  PY_VERSION: "3.14"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      # Short checkout path (b) + long-path registry avoid MSVC MAX_PATH (260)
      # errors on ncnn/glslang's deep object paths (C1083 empty-filename).
      - name: Enable long paths
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: b

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install SWIG
        run: choco install swig ninja -y --no-progress

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          winget install --id KhronosGroup.VulkanSDK --disable-interactivity --accept-source-agreements --accept-package-agreements
          $vulkanPath = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          echo "VULKAN_SDK=$($vulkanPath.FullName)" >> $env:GITHUB_ENV
          echo "$($vulkanPath.FullName)\Bin" >> $env:GITHUB_PATH

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}
          architecture: x64

      - name: Build wheel
        shell: pwsh
        working-directory: b
        run: |
          python -m pip install --upgrade build
          $env:CMAKE_FLAGS = "-DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DPY_VERSION=$env:PY_VERSION"
          python -m build -w .

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows
          path: b/dist/*.whl

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y swig libvulkan-dev ninja-build build-essential

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Build wheel
        run: |
          python -m pip install --upgrade build
          export CMAKE_FLAGS="-DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DPY_VERSION=${PY_VERSION}"
          python -m build -w .

      - name: Rename linux -> manylinux
        run: python replace_whl.py

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux
          path: dist/*.whl

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # arm64
          - runner: macos-13   # x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: brew install swig ninja molten-vk vulkan-headers vulkan-loader

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Build wheel
        run: |
          BREW="$(brew --prefix)"
          export VULKAN_SDK="$BREW"
          python -m pip install --upgrade build
          export CMAKE_FLAGS="-DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DPY_VERSION=${PY_VERSION} -DVulkan_INCLUDE_DIR=${BREW}/include -DVulkan_LIBRARY=${BREW}/lib/libvulkan.dylib"
          python -m build -w .

      - name: Rename macos universal2 -> arch
        run: python replace_whl.py

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-${{ matrix.runner }}
          path: dist/*.whl
